apis:
  - aid: vatapi:vat-api
    name: VAT API v2
    description: REST API for EU and UK VAT compliance including VAT rate lookups by country, VAT number validation against VIES and HMRC, currency conversion rates from HMRC and ECB, and generation of VAT-compliant invoices with sequential numbering.
